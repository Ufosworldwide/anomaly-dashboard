<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPDM · Sighting Correlation Observatory</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"><\/script>
<style>
:root {
  --bg:#05080f;--surface:#0a0e1a;--panel:#0f1525;--border:#182035;--border-hi:#243050;
  --t1:#00d4ff;--t1d:#003d4d;--t1s:#7ec8ff;--t2:#ffaa00;--t2d:#4d3200;--t2t:#ffe066;--t3:#00ff99;--t3d:#004d2e;
  --text:#b8cce0;--dim:#48607a;--white:#e8f2ff;--solar:#ff6b35;
  --mono:"DM Mono",monospace;--display:"Oxanium",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--display);overflow:hidden;}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.008) 3px,rgba(0,212,255,.008) 4px);pointer-events:none;z-index:9999;}
.app{display:grid;grid-template-rows:56px 1fr;height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;position:relative;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ring{width:36px;height:36px;border:1px solid var(--t1);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;animation:rp 4s ease-in-out infinite;}
.logo-ring::before{content:"";position:absolute;inset:5px;border:1px solid rgba(0,212,255,.3);border-radius:50%;animation:rp 4s ease-in-out infinite reverse;}
.logo-ring span{font-size:14px;position:relative;z-index:1;}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.3);}50%{box-shadow:0 0 0 6px rgba(0,212,255,0);}}
h1{font-size:15px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--t1);}
.subtitle{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.1em;margin-top:1px;}
.header-stats{margin-left:auto;display:flex;gap:24px;}
.hstat{text-align:right;}
.hstat-val{font-size:18px;font-weight:700;color:var(--t1);line-height:1;}
.hstat-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.08em;margin-top:2px;}
.body{display:grid;grid-template-columns:260px 1fr 300px;height:100%;overflow:hidden;}
.left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.panel-section{border-bottom:1px solid var(--border);padding:14px 16px;}
.panel-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.panel-label::after{content:"";flex:1;height:1px;background:var(--border);}
.site-btn{width:100%;padding:9px 12px;margin-bottom:4px;background:transparent;border:1px solid var(--border);cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;position:relative;overflow:hidden;}
.site-btn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .15s;}
.site-btn:hover{background:rgba(255,255,255,.02);}
.site-btn.active{border-color:var(--site-color);background:rgba(0,0,0,.2);}
.site-btn.active::before{background:var(--site-color);}
.site-btn.active .site-name{color:var(--site-color);}
.site-type-badge{font-family:var(--mono);font-size:8px;padding:2px 5px;border:1px solid var(--site-color);color:var(--site-color);letter-spacing:.05em;flex-shrink:0;}
.site-name{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text);}
.site-count{font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:auto;}
.filter-row{margin-bottom:8px;}
.filter-label{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.08em;margin-bottom:4px;}
input[type=range]{width:100%;accent-color:var(--t1);cursor:pointer;}
.range-val{font-family:var(--mono);font-size:10px;color:var(--t1);text-align:right;}
select{width:100%;background:var(--bg);border:1px solid var(--border-hi);color:var(--text);font-family:var(--mono);font-size:10px;padding:5px 8px;outline:none;cursor:pointer;}
select:focus{border-color:var(--t1);}
select option{background:var(--panel);}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-label{font-family:var(--mono);font-size:9px;color:var(--dim);}
.center{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.tab{padding:10px 18px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);cursor:pointer;border-right:1px solid var(--border);border-bottom:2px solid transparent;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--t1);border-bottom-color:var(--t1);background:rgba(0,212,255,.04);}
.tab-content{flex:1;overflow:hidden;display:none;}
.tab-content.active{display:flex;flex-direction:column;}
#mapCanvas{flex:1;background:var(--bg);cursor:crosshair;display:block;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);flex:1;overflow:hidden;}
.chart-cell{background:var(--bg);padding:16px;display:flex;flex-direction:column;}
.chart-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.chart-cell canvas{flex:1;min-height:0;}
.chart-cell.wide{grid-column:1/-1;}
.right{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.site-stats{padding:14px 16px;border-bottom:1px solid var(--border);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{background:var(--panel);border:1px solid var(--border);padding:8px 10px;}
.stat-box-val{font-size:20px;font-weight:700;line-height:1;color:var(--t1);}
.stat-box-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.08em;margin-top:2px;}
.solar-badge{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.solar-ratio-big{font-size:28px;font-weight:700;}
.solar-positive{color:var(--solar);}.solar-neutral{color:var(--dim);}.solar-inverse{color:#aa88ff;}
.solar-label{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.08em;}
.solar-desc{font-size:10px;color:var(--text);margin-top:2px;}
.data-table-wrap{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:10px;}
thead{position:sticky;top:0;background:var(--panel);z-index:10;}
thead th{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid rgba(24,32,53,.5);transition:background .1s;}
tbody tr:hover{background:rgba(0,212,255,.03);}
tbody td{padding:6px 10px;font-family:var(--mono);font-size:9px;color:var(--text);white-space:nowrap;}
.td-date{color:var(--dim);}.td-shape{color:var(--t2);}.td-hynek{color:var(--t1);}
.q-hi{color:#00ff99;}.q-mid{color:var(--t2);}.q-lo{color:#ff4466;}
#tooltip{position:fixed;background:var(--panel);border:1px solid var(--border-hi);padding:10px 14px;font-family:var(--mono);font-size:10px;pointer-events:none;z-index:1000;max-width:240px;display:none;line-height:1.6;}
#tooltip.show{display:block;}
#tooltip .tt-date{color:var(--dim);font-size:9px;}
#tooltip .tt-loc{color:var(--t1);font-weight:500;margin-bottom:4px;}
#tooltip .tt-shape{color:var(--t2);}
#tooltip .tt-mv{color:var(--t3);font-size:9px;}
.fw-row{margin-bottom:8px;padding:8px 10px;background:var(--panel);border-left:2px solid var(--border-hi);}
.fw-site{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.fw-metrics{font-family:var(--mono);font-size:9px;color:var(--dim);line-height:1.7;}
.fw-metrics span{color:var(--text);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">
    <div class="logo-ring"><span>◎</span></div>
    <div><h1>GPDM Observatory</h1><div class="subtitle">GEOLOGICAL PATHWAY DIVERSITY MODEL · UFOSINT SIGHTING CORRELATION · 5,880 RECORDS</div></div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val">5,880</div><div class="hstat-lbl">TOTAL SIGHTINGS</div></div>
    <div class="hstat"><div class="hstat-val" style="color:var(--t3)">5</div><div class="hstat-lbl">GPDM SITES</div></div>
    <div class="hstat"><div class="hstat-val" style="color:var(--t2)">1947–2026</div><div class="hstat-lbl">DATE SPAN</div></div>
    <div class="hstat"><div class="hstat-val" style="color:var(--t3)">100%</div><div class="hstat-lbl">GENUINE (≤20 HOAX)</div></div>
  </div>
</header>

<div class="body">
<div class="left">
  <div class="panel-section">
    <div class="panel-label">GPDM Sites</div>
    <button class="site-btn active" data-site="all" style="--site-color:#ffffff" onclick="selectSite('all')">
      <div class="site-type-badge" style="border-color:#fff;color:#fff">ALL</div>
      <div class="site-name">All Sites</div><div class="site-count">5,880</div>
    </button>
    <button class="site-btn" data-site="hessdalen" style="--site-color:#00d4ff" onclick="selectSite('hessdalen')">
      <div class="site-type-badge">T·I</div><div class="site-name">Hessdalen</div><div class="site-count">68</div>
    </button>
    <button class="site-btn" data-site="blacklake" style="--site-color:#7ec8ff" onclick="selectSite('blacklake')">
      <div class="site-type-badge" style="border-color:#7ec8ff;color:#7ec8ff">T·I-S</div><div class="site-name">Black Lake</div><div class="site-count">597</div>
    </button>
    <button class="site-btn" data-site="brownmtn" style="--site-color:#ffaa00" onclick="selectSite('brownmtn')">
      <div class="site-type-badge" style="border-color:#ffaa00;color:#ffaa00">T·II</div><div class="site-name">Brown Mountain</div><div class="site-count">2,126</div>
    </button>
    <button class="site-btn" data-site="timewarp" style="--site-color:#ffe066" onclick="selectSite('timewarp')">
      <div class="site-type-badge" style="border-color:#ffe066;color:#ffe066">T·II-T</div><div class="site-name">Time Warp</div><div class="site-count">2,909</div>
    </button>
    <button class="site-btn" data-site="juaica" style="--site-color:#00ff99" onclick="selectSite('juaica')">
      <div class="site-type-badge" style="border-color:#00ff99;color:#00ff99">T·III</div><div class="site-name">La Peña de Juaica</div><div class="site-count">180</div>
    </button>
  </div>
  <div class="panel-section">
    <div class="panel-label">Filters</div>
    <div class="filter-row">
      <div class="filter-label">MIN QUALITY SCORE</div>
      <input type="range" id="qualFilter" min="0" max="80" value="0" oninput="applyFilters()">
      <div class="range-val" id="qualVal">0 — all records</div>
    </div>
    <div class="filter-row">
      <div class="filter-label">DECADE</div>
      <select id="decadeFilter" onchange="applyFilters()">
        <option value="">All decades</option>
        <option>1940s</option><option>1950s</option><option>1960s</option><option>1970s</option>
        <option>1980s</option><option>1990s</option><option>2000s</option><option>2010s</option><option>2020s</option>
      </select>
    </div>
    <div class="filter-row">
      <div class="filter-label">MOVEMENT</div>
      <select id="mvFilter" onchange="applyFilters()">
        <option value="">All movements</option>
        <option>vanished</option><option>hovering</option><option>followed</option>
        <option>ascending</option><option>descending</option><option>landed</option>
        <option>accelerating</option><option>rotating</option><option>erratic</option>
      </select>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Legend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00d4ff"></div><div class="legend-label">Type I — Hessdalen, Norway</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#7ec8ff"></div><div class="legend-label">Type I-S — Black Lake, Quebec</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffaa00"></div><div class="legend-label">Type II — Brown Mountain, NC</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffe066"></div><div class="legend-label">Type II-T — Time Warp, NV</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#00ff99"></div><div class="legend-label">Type III — La Peña de Juaica</div></div>
    <div style="margin-top:8px;font-family:var(--mono);font-size:9px;color:var(--dim)">POINT SIZE = quality score<br>HOVER = sighting detail</div>
  </div>
</div>

<div class="center">
  <div class="tabs">
    <div class="tab active" onclick="showTab('map')">◎ MAP</div>
    <div class="tab" onclick="showTab('charts')">▦ ANALYTICS</div>
    <div class="tab" onclick="showTab('framework')">⬡ GPDM FRAMEWORK</div>
  </div>
  <div class="tab-content active" id="tab-map">
    <canvas id="mapCanvas"></canvas>
  </div>
  <div class="tab-content" id="tab-charts">
    <div class="chart-grid">
      <div class="chart-cell wide">
        <div class="chart-title">◈ Sighting Frequency by Decade — All 5 GPDM Sites vs Solar Cycle Peaks</div>
        <canvas id="decadeChart"></canvas>
      </div>
      <div class="chart-cell">
        <div class="chart-title">◈ Shape Distribution — Active Site</div>
        <canvas id="shapeChart"></canvas>
      </div>
      <div class="chart-cell">
        <div class="chart-title">◈ Movement Signature — Active Site</div>
        <canvas id="movementChart"></canvas>
      </div>
    </div>
  </div>
  <div class="tab-content" id="tab-framework">
    <div style="padding:20px;overflow-y:auto;flex:1">
      <div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.12em;margin-bottom:16px;text-transform:uppercase">GPDM · Empirical Dataset Integration · UFOSINT Correlation v1.0</div>
      <div style="margin-bottom:16px;padding:14px;background:var(--panel);border:1px solid var(--border-hi)">
        <div style="font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--t1);margin-bottom:8px">P(discharge) = f(G,S,M,H) × f(T,Sch,SA) × f(Δtidal,t)</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--dim);line-height:1.8">
          G=geological · S=sulfide/serpentinite · M=metallic · H=humidity<br>
          T=thermal · Sch=Schumann resonance · SA=solar activity<br>
          This dataset provides empirical baseline for SA term validation and discharge event frequency distribution per site type.
        </div>
      </div>
      <div id="frameworkRows"></div>
      <div style="margin-top:16px;padding:14px;background:var(--panel);border:1px solid var(--border-hi)">
        <div style="font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.1em;margin-bottom:8px;text-transform:uppercase">⚠ Juaica CE3/CE4 Exclusion Note</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--dim);line-height:1.8">19.4% CE3+CE4 (humanoid contact) classification at Juaica — concentrated in 1960s–70s. Reflects regional folkloric reporting bias. Recommend excluding CE3/CE4 records from GPDM discharge frequency analysis. Filtered dataset (n≈110 NL/DD/CE1/CE2) represents viable Type III candidate events.</div>
      </div>
      <div style="margin-top:12px;padding:14px;background:var(--panel);border:1px solid var(--border-hi)">
        <div style="font-family:var(--mono);font-size:9px;color:var(--t1);letter-spacing:.1em;margin-bottom:8px;text-transform:uppercase">◎ Hessdalen Feb 1984 Cluster</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--dim);line-height:1.8">12 RV (Radar/Visual) records during Project Hessdalen research period. Cross-reference with Fred Pallesen archive for instrument overlap dates. Highest-credibility bridge between civilian sighting database and controlled scientific observation in this dataset.</div>
      </div>
    </div>
  </div>
</div>

<div class="right">
  <div class="site-stats">
    <div class="panel-label" style="margin-bottom:8px">Active Site</div>
    <div id="activeSiteName" style="font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--t1);text-transform:uppercase;margin-bottom:10px">All Sites Combined</div>
    <div class="stat-grid" id="statGrid"></div>
  </div>
  <div class="solar-badge">
    <div>
      <div class="solar-ratio-big" id="solarRatio">—</div>
      <div class="solar-label">SOLAR MAX/MIN RATIO</div>
    </div>
    <div><div class="solar-desc" id="solarDesc">Select a site to view solar correlation</div></div>
  </div>
  <div class="panel-section" style="padding:10px 16px">
    <div class="panel-label">Recent Sightings</div>
  </div>
  <div class="data-table-wrap">
    <table>
      <thead><tr><th>DATE</th><th>SHAPE</th><th>Q</th><th>HYNEK</th><th>SITE</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>
</div>
</div>
<div id="tooltip"></div>

const SITE_COLORS={hessdalen:"#00d4ff",blacklake:"#7ec8ff",brownmtn:"#ffaa00",timewarp:"#ffe066",juaica:"#00ff99"};
const SITE_ORDER=["hessdalen","blacklake","brownmtn","timewarp","juaica"];
const SITE_ABBR={hessdalen:"HESS",blacklake:"BLK",brownmtn:"BRMTN",timewarp:"TWP",juaica:"JUAI"};
let activeSite="all",charts={};

window.addEventListener("load",()=>{
  buildFrameworkRows();updateRightPanel();renderMap();initCharts();renderTable();
});

function showTab(id){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["map","charts","framework"][i]===id));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  if(id==="map")renderMap();
  if(id==="charts")setTimeout(updateCharts,50);
}

function selectSite(id){
  activeSite=id;
  document.querySelectorAll(".site-btn").forEach(b=>b.classList.toggle("active",b.dataset.site===id));
  updateRightPanel();renderMap();updateCharts();renderTable();
}

function applyFilters(){
  const q=document.getElementById("qualFilter").value;
  document.getElementById("qualVal").textContent=q==0?"0 — all records":"≥"+q;
  renderMap();renderTable();
}

function getFilters(){
  return{minQ:parseInt(document.getElementById("qualFilter").value)||0,decade:document.getElementById("decadeFilter").value,mv:document.getElementById("mvFilter").value};
}

function getPoints(siteId){
  const f=getFilters();
  const sites=siteId==="all"?SITE_ORDER:[siteId];
  let pts=[];
  sites.forEach(sid=>{
    const s=DATA[sid];if(!s)return;
    s.geo_points.forEach(p=>{
      if(f.minQ&&p.q<f.minQ)return;
      if(f.decade){const dec=f.decade.slice(0,3);if(!p.date||p.date.slice(0,3)!==dec)return;}
      if(f.mv&&!p.mv.includes(f.mv))return;
      pts.push({...p,site:sid,color:SITE_COLORS[sid]});
    });
  });
  return pts;
}

const WB={minLat:-60,maxLat:80,minLon:-180,maxLon:180};
function latY(lat,h){return h-((lat-WB.minLat)/(WB.maxLat-WB.minLat))*h;}
function lonX(lon,w){return((lon-WB.minLon)/(WB.maxLon-WB.minLon))*w;}

function renderMap(){
  const canvas=document.getElementById("mapCanvas");
  const cont=canvas.parentElement;
  canvas.width=cont.clientWidth;canvas.height=cont.clientHeight;
  const ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  ctx.fillStyle="#05080f";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(24,32,53,.5)";ctx.lineWidth=.5;
  for(let lat=-60;lat<=80;lat+=20){const y=latY(lat,H);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let lon=-180;lon<=180;lon+=30){const x=lonX(lon,W);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  ctx.strokeStyle="rgba(0,212,255,.12)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,latY(0,H));ctx.lineTo(W,latY(0,H));ctx.stroke();
  SITE_ORDER.forEach(sid=>{
    const s=DATA[sid];const x=lonX(s.lon,W),y=latY(s.lat,H);const col=SITE_COLORS[sid];
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([3,4]);
    ctx.beginPath();ctx.arc(x,y,16,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    ctx.strokeStyle=col+"66";ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(x-22,y);ctx.lineTo(x+22,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-22);ctx.lineTo(x,y+22);ctx.stroke();
  });
  const pts=getPoints(activeSite);
  pts.forEach(p=>{
    const x=lonX(p.lon,W),y=latY(p.lat,H);
    const r=Math.max(1.5,Math.min(5,p.q/18));
    ctx.fillStyle=p.color+"99";ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  });
  SITE_ORDER.forEach(sid=>{
    const s=DATA[sid];const x=lonX(s.lon,W),y=latY(s.lat,H);
    ctx.fillStyle=SITE_COLORS[sid];ctx.font="700 9px DM Mono";
    ctx.fillText(s.name.toUpperCase(),x+20,y-6);
    ctx.fillStyle=SITE_COLORS[sid]+"88";ctx.font="8px DM Mono";
    ctx.fillText("Type "+s.type+" · n="+s.total,x+20,y+5);
  });
  canvas.onmousemove=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const tt=document.getElementById("tooltip");
    let found=null;
    pts.forEach(p=>{
      const px=lonX(p.lon,W),py=latY(p.lat,H);
      if(Math.sqrt((px-mx)**2+(py-my)**2)<8)found=p;
    });
    if(found){
      let mv="—";try{const a=JSON.parse(found.mv);if(a.length)mv=a.join(", ");}catch(e){}
      tt.innerHTML=`<div class="tt-date">${found.date||"?"} · ${DATA[found.site].name}</div><div class="tt-loc">${found.lat.toFixed(3)}°, ${found.lon.toFixed(3)}°</div><div class="tt-shape">${found.shape||"Unknown"} ${found.hynek?"· "+found.hynek:""}</div><div>Quality: <b>${found.q}</b></div><div class="tt-mv">Movement: ${mv}</div><div style="color:var(--dim);font-size:9px">Emotion: ${found.em||"—"}</div>`;
      tt.style.left=(e.clientX+12)+"px";tt.style.top=(e.clientY-10)+"px";tt.className="show";
    }else{tt.className="";}
  };
  canvas.onmouseleave=()=>{document.getElementById("tooltip").className="";};
}

function initCharts(){
  Chart.defaults.color="#48607a";Chart.defaults.font.family="DM Mono";Chart.defaults.font.size=9;
  const decades=["1940s","1950s","1960s","1970s","1980s","1990s","2000s","2010s","2020s"];
  const dCtx=document.getElementById("decadeChart").getContext("2d");
  charts.decade=new Chart(dCtx,{type:"line",data:{labels:decades,datasets:SITE_ORDER.map(sid=>({label:DATA[sid].name,data:decades.map(d=>DATA[sid].decade_counts[parseInt(d)]||0),backgroundColor:SITE_COLORS[sid]+"44",borderColor:SITE_COLORS[sid],borderWidth:1.5,fill:true,tension:.4,pointRadius:3,pointHoverRadius:5}))},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,position:"top",labels:{boxWidth:8,padding:10,font:{size:8}}},tooltip:{backgroundColor:"#0f1525",borderColor:"#243050",borderWidth:1}},scales:{x:{grid:{color:"#182035"},ticks:{font:{size:8}}},y:{grid:{color:"#182035"},ticks:{font:{size:8}}}}}});
  const sCtx=document.getElementById("shapeChart").getContext("2d");
  charts.shape=new Chart(sCtx,{type:"doughnut",data:{labels:[],datasets:[{data:[],backgroundColor:[],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{boxWidth:8,padding:6,font:{size:8}}}}}});
  const mCtx=document.getElementById("movementChart").getContext("2d");
  charts.movement=new Chart(mCtx,{type:"bar",data:{labels:[],datasets:[{data:[],backgroundColor:[],borderWidth:0}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"#182035"},ticks:{font:{size:8}}},y:{grid:{color:"#182035"},ticks:{font:{size:8}}}}}});
  updateCharts();
}

function updateCharts(){
  if(!charts.shape)return;
  const sid=activeSite==="all"?"brownmtn":activeSite;
  const s=DATA[sid];const col=SITE_COLORS[sid]||"#00d4ff";
  const sk=Object.keys(s.shapes).slice(0,8);
  charts.shape.data.labels=sk;
  charts.shape.data.datasets[0].data=sk.map(k=>s.shapes[k]);
  charts.shape.data.datasets[0].backgroundColor=sk.map((_,i)=>col+Math.floor(200-i*18).toString(16).padStart(2,"0"));
  charts.shape.update();
  const mk=Object.keys(s.movements).slice(0,10);
  charts.movement.data.labels=mk;
  charts.movement.data.datasets[0].data=mk.map(k=>s.movements[k]);
  charts.movement.data.datasets[0].backgroundColor=mk.map((_,i)=>col+(i%2===0?"bb":"66"));
  charts.movement.update();
}

function updateRightPanel(){
  const sid=activeSite,isAll=sid==="all";
  const nameEl=document.getElementById("activeSiteName");
  nameEl.textContent=isAll?"All Sites Combined":DATA[sid].name;
  nameEl.style.color=isAll?"#ffffff":SITE_COLORS[sid];
  const sg=document.getElementById("statGrid");
  if(isAll){
    const tot=SITE_ORDER.reduce((a,s)=>a+DATA[s].total,0);
    const hq=SITE_ORDER.reduce((a,s)=>a+DATA[s].high_quality,0);
    sg.innerHTML=`<div class="stat-box"><div class="stat-box-val">${tot.toLocaleString()}</div><div class="stat-box-lbl">TOTAL</div></div><div class="stat-box"><div class="stat-box-val" style="color:var(--t3)">${hq.toLocaleString()}</div><div class="stat-box-lbl">HIGH QUAL</div></div><div class="stat-box"><div class="stat-box-val" style="color:var(--t2)">1947</div><div class="stat-box-lbl">EARLIEST</div></div><div class="stat-box"><div class="stat-box-val" style="color:var(--t2)">2026</div><div class="stat-box-lbl">LATEST</div></div>`;
    document.getElementById("solarRatio").textContent="—";
    document.getElementById("solarRatio").className="solar-ratio-big";
    document.getElementById("solarDesc").textContent="Select individual site for solar correlation";
  }else{
    const s=DATA[sid];
    sg.innerHTML=`<div class="stat-box"><div class="stat-box-val">${s.total.toLocaleString()}</div><div class="stat-box-lbl">SIGHTINGS</div></div><div class="stat-box"><div class="stat-box-val" style="color:var(--t3)">${s.high_quality}</div><div class="stat-box-lbl">HIGH QUAL</div></div><div class="stat-box"><div class="stat-box-val" style="color:var(--t2)">${s.avg_quality}</div><div class="stat-box-lbl">AVG QUAL</div></div><div class="stat-box"><div class="stat-box-val" style="font-size:13px;padding-top:3px">T-${s.type}</div><div class="stat-box-lbl">GPDM TYPE</div></div>`;
    const r=s.solar_ratio;
    let cls="solar-ratio-big ",desc="";
    if(r>1.1){cls+="solar-positive";desc="↑ Elevated at solar maximum — validates SA term in P(discharge)";}
    else if(r<0.75){cls+="solar-inverse";desc="↓ Elevated at solar minimum — novel serpentinite tidal stress sub-hypothesis";}
    else{cls+="solar-neutral";desc="≈ No significant solar cycle bias — thermal mechanism likely dominant";}
    document.getElementById("solarRatio").textContent=r.toFixed(2)+"×";
    document.getElementById("solarRatio").className=cls;
    document.getElementById("solarDesc").textContent=desc;
  }
}

function renderTable(){
  const f=getFilters();
  let rows=[];
  const sites=activeSite==="all"?SITE_ORDER:[activeSite];
  sites.forEach(sid=>{
    DATA[sid].geo_points.forEach(p=>{
      if(f.minQ&&p.q<f.minQ)return;
      if(f.mv&&!p.mv.includes(f.mv))return;
      rows.push({...p,site:sid});
    });
  });
  rows.sort((a,b)=>(b.date||"0").localeCompare(a.date||"0"));
  rows=rows.slice(0,100);
  const tb=document.getElementById("tableBody");
  tb.innerHTML=rows.map(r=>{
    const qc=r.q>=60?"q-hi":r.q>=30?"q-mid":"q-lo";
    const col=SITE_COLORS[r.site];
    return `<tr><td class="td-date">${r.date||"?"}</td><td class="td-shape">${r.shape||"—"}</td><td class="${qc}">${r.q}</td><td class="td-hynek">${r.hynek||"—"}</td><td style="color:${col};font-size:8px">${SITE_ABBR[r.site]}</td></tr>`;
  }).join("");
}

function buildFrameworkRows(){
  const si={
    hessdalen:{col:"var(--solar)",txt:"↑ Solar-positive (1.38×) — validates SA term in P(discharge) predictive function"},
    blacklake:{col:"#aa88ff",txt:"↓ Solar-minimum bias (0.43×) — candidate novel sub-hypothesis: serpentinite responds to tidal stress loading under quiet solar conditions"},
    brownmtn:{col:"var(--solar)",txt:"↑ Solar-positive (1.32×) — consistent with fault activation via ionospheric coupling during high Kp periods"},
    timewarp:{col:"var(--dim)",txt:"≈ Solar-neutral (0.93×) — thermal-arid ground mechanism likely dominates over solar modulation at this site"},
    juaica:{col:"var(--dim)",txt:"≈ Solar-neutral (0.88×) — CE3/CE4 cultural bias may mask signal; filtered dataset required for GPDM integration"}
  };
  const mv={
    hessdalen:"hovering 8.8%, ascending 7.4%, landed 7.4% → low-energy sustained discharge signature consistent with continuous sulfide-amplified Type I",
    blacklake:"vanished 11.4%, hovering 10.2% → episodic discharge pattern consistent with piezomagnetic pulse mechanism",
    brownmtn:"vanished 21.4%, hovering 19.0% → dominant NL signature across entire record; movement profile aligns Type II locked fault episodic profile",
    timewarp:"vanished 21.4%, hovering 17.0%, erratic 1.9% slightly elevated → broadly matches Type II with minor thermal arid differentiation",
    juaica:"landed 13.9%, erratic 3.3% → metallic surface charge focusing; elevated landed events suggest low-altitude or ground-contact phenomenology"
  };
  document.getElementById("frameworkRows").innerHTML=SITE_ORDER.map(sid=>{
    const s=DATA[sid];const col=SITE_COLORS[sid];const x=si[sid];
    const ts=Object.entries(s.shapes).sort((a,b)=>b[1]-a[1])[0];
    return `<div class="fw-row" style="border-left-color:${col}"><div class="fw-site" style="color:${col}">${s.name} — Type ${s.type} (n=${s.total})</div><div class="fw-metrics">SOLAR RATIO: <span style="color:${x.col}">${s.solar_ratio}×</span> — ${x.txt}<br>TOP SHAPE: <span>${ts[0]} (${ts[1]})</span> · AVG QUALITY: <span>${s.avg_quality}/100</span> · HIGH QUAL: <span>${s.high_quality} (${Math.round(s.high_quality/s.total*100)}%)</span><br>MOVEMENT: <span>${mv[sid]}</span></div></div>`;
  }).join("");
}
